name: Build Kythera Native APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Native APK
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repo
        uses: actions/checkout@v4

      # 1. SIAPIN MESIN JAVA 17
      - name: Siapin Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 2. BIKIN GRADLEW KALAU KOSONG
      - name: Siapin Mesin Gradlew
        run: |
          if [ ! -f "gradlew" ]; then
            echo "File gradlew nggak ketemu, mari kita bikin otomatis!"
            gradle wrapper
          fi
          chmod +x ./gradlew

      # 3. SUNTIK SAKLAR ANDROIDX
      - name: Aktifin Saklar AndroidX
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties

      # 4. PYTHON PEMBASMI TEMA JADUL (DIJAMIN TEMBUS!)
      - name: Basmi Tema Jadul Claude
        run: |
          python3 -c '
          import os
          for root, dirs, files in os.walk("app/src/main"):
              for file in files:
                  if file.endswith(".xml"):
                      filepath = os.path.join(root, file)
                      with open(filepath, "r") as f: content = f.read()
                      if "Theme.Material.NoTitleBar" in content:
                          print(f"Ketemu tema jadul di: {filepath}")
                          content = content.replace("Theme.Material.NoTitleBar", "Theme.DeviceDefault.NoActionBar")
                          with open(filepath, "w") as f: f.write(content)
          '

      # 5. GEBER RAKIT APK RELEASE!
      - name: Rakit APK Release (Native)
        run: ./gradlew assembleRelease --no-daemon

      # 6. UPLOAD HASILNYA
      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Kythera-Tools-Native-APK
          path: app/build/outputs/apk/release/*.apk
