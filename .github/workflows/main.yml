name: Build Kythera Native APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Native APK
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repo
        uses: actions/checkout@v4

      # 1. SIAPIN MESIN JAVA 17
      - name: Siapin Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 2. JURUS OTOMATIS: BIKIN GRADLEW KALAU KOSONG
      - name: Siapin Mesin Gradlew
        run: |
          if [ ! -f "gradlew" ]; then
            echo "File gradlew nggak ketemu dari ZIP, mari kita bikin otomatis!"
            gradle wrapper
          fi
          chmod +x ./gradlew

      # 3. SUNTIK SAKLAR ANDROIDX (INI OBATNYA!)
      - name: Aktifin Saklar AndroidX
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          # Sekalian matiin warning SDK 35 biar log-nya bersih
          echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties

      # 4. GEBER RAKIT APK RELEASE!
      - name: Rakit APK Release (Native)
        run: ./gradlew assembleRelease --no-daemon

      # 5. UPLOAD HASILNYA
      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Kythera-Tools-Native-APK
          path: app/build/outputs/apk/release/*.apk
