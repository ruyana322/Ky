name: Build Kythera Native APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Native APK
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repo
        uses: actions/checkout@v4

      # 1. SIAPIN MESIN JAVA 17
      - name: Siapin Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 2. BIKIN GRADLEW KALAU KOSONG (Kompensasi Kimi)
      - name: Siapin Mesin Gradlew
        run: |
          if [ ! -f "gradlew" ]; then
            echo "File gradlew nggak ketemu, mari kita bikin!"
            gradle wrapper
          fi
          chmod +x ./gradlew

      # 3. SUNTIK SAKLAR ANDROIDX
      - name: Aktifin Saklar AndroidX
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties

      # 4. BUKA GUDANG SONATYPE (OBAT KANGEN FFMPEG!)
      - name: Suntik Gudang Sonatype
        run: |
          python3 -c '
          import os
          # Cari file settings.gradle atau settings.gradle.kts bawaan Claude
          for file in ["settings.gradle", "settings.gradle.kts"]:
              if os.path.exists(file):
                  with open(file, "r") as f: c = f.read()
                  
                  # Paksa robot nurut sama settingan ini
                  c = c.replace("FAIL_ON_PROJECT_REPOS", "PREFER_SETTINGS")
                  
                  # Suntik alamat Sonatype
                  if "sonatype" not in c:
                      if file.endswith(".kts"):
                          c = c.replace("mavenCentral()", "mavenCentral()\n        maven { url = uri(\"https://s01.oss.sonatype.org/content/repositories/releases/\") }\n        maven { url = uri(\"https://jitpack.io\") }")
                      else:
                          c = c.replace("mavenCentral()", "mavenCentral()\n        maven { url \"https://s01.oss.sonatype.org/content/repositories/releases/\" }\n        maven { url \"https://jitpack.io\" }")
                  
                  with open(file, "w") as f: f.write(c)
          '

      # 5. GEBER RAKIT APK RELEASE!
      - name: Rakit APK Release (Native)
        run: ./gradlew assembleRelease --no-daemon

      # 6. UPLOAD HASILNYA
      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Kythera-Tools-Native-APK
          path: app/build/outputs/apk/release/*.apk
