name: Build Kythera Native APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: build-kythera-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release Native APK
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repo
        uses: actions/checkout@v4

      - name: Siapin Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Siapin Mesin Gradlew
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Bikin gradlew otomatis..."
            gradle wrapper
          fi
          chmod +x ./gradlew

      - name: Aktifin Saklar & Doping RAM
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8" >> gradle.properties

      - name: Basmi Tema Jadul
        run: |
          python3 -c '
          import os
          for root, dirs, files in os.walk("app/src/main"):
              for file in files:
                  if file.endswith(".xml"):
                      filepath = os.path.join(root, file)
                      with open(filepath, "r") as f: c = f.read()
                      if "Theme.Material.NoTitleBar" in c:
                          c = c.replace("Theme.Material.NoTitleBar", "Theme.DeviceDefault.NoActionBar")
                          with open(filepath, "w") as f: f.write(c)
          '

      - name: Download Mentahan FFmpeg Raja Terakhir
        run: |
          mkdir -p app/libs
          wget -q --show-progress \
            "https://artifactory.appodeal.com/appodeal-public/com/arthenica/ffmpeg-kit-full-gpl/6.0-2.LTS/ffmpeg-kit-full-gpl-6.0-2.LTS.aar" \
            -O app/libs/ffmpeg-kit-full-gpl-6.0-2.LTS.aar

      - name: Verifikasi AAR FFmpeg
        run: |
          if [ ! -f "app/libs/ffmpeg-kit-full-gpl-6.0-2.LTS.aar" ]; then
            echo "ERROR: FFmpeg AAR gagal didownload!"
            exit 1
          fi
          echo "FFmpeg AAR size: $(du -sh app/libs/ffmpeg-kit-full-gpl-6.0-2.LTS.aar)"

      - name: Rakit APK Release
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release/
          for f in *.apk; do
            mv "$f" "KytheraTools-release-$(date +%Y%m%d-%H%M).apk"
          done

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Kythera-Tools-Native-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7